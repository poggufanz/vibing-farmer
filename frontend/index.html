<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YIELD VIBING — AI Yield Farming</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <!-- Import map to resolve esm.sh absolute path imports in the browser -->
  <script type="importmap">
    {
      "imports": {
        "/@neo4j-nvl/": "https://esm.sh/@neo4j-nvl/",
        "/@segment/": "https://esm.sh/@segment/"
      }
    }
  </script>

  <!-- React 18 + Babel (in-browser JSX transpilation, no build step) -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="root"></div>

<!-- Bridge: load real Web3 ESM modules → window globals so Babel JSX can access them -->
<script type="module">
  import { connectWallet, getAccount, requestERC7715Permission, signSiweForVenice } from './wallet.js'
  import { generateStrategy } from './venice.js'
  import { OrchestratorAgent } from './orchestrator.js'
  import { makeAgentId } from './worker.js'
  window._yv = { connectWallet, getAccount, requestERC7715Permission, signSiweForVenice, generateStrategy, OrchestratorAgent, makeAgentId }
  window._yvAgentMap = {}
  console.log('[YIELD VIBING] Web3 modules loaded. Connect wallet to start.')
</script>

<!-- NVL: separate import so failure doesn't break the app -->
<script type="module">
  try {
    const mod = await import('https://esm.sh/@neo4j-nvl/base@1.2.0')
    const NVL = mod.NVL || mod.default
    if (NVL) {
      window._nvl = { NVL }
      console.log('[NVL] loaded successfully, constructor:', typeof NVL)
    } else {
      console.error('[NVL] module loaded but NVL class not found. Exports:', Object.keys(mod))
    }
  } catch (err) {
    console.error('[NVL] failed to load from CDN:', err)
  }
  window.dispatchEvent(new Event('nvl-ready'))
</script>

<!-- JSX components — loaded in dependency order -->
<script type="text/babel" src="src/tweaks-panel.jsx"></script>
<script type="text/babel" src="src/components.jsx"></script>
<script type="text/babel" src="src/skills.jsx"></script>
<script type="text/babel" src="src/screens.jsx"></script>
<script type="text/babel" src="src/agents.jsx"></script>
<script type="text/babel" src="src/app.jsx"></script>

<!-- Mount React app -->
<script type="text/babel">
  ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
